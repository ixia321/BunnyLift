<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BunnyLift — Science-Based Fitness for Women</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brown: '#8B5A2B',
                        pink: '#FFB5C5',
                        cream: '#FFF0F5',
                        'light-pink': '#FFE4E9',
                        text: '#4A3728',
                        'text-light': '#8B7355',
                        glute: '#FF8FAB',
                        leg: '#D4A574',
                        shoulder: '#87CEEB',
                        back: '#98D8C8',
                        chest: '#F7DC6F',
                        core: '#BB8FCE',
                        cardio: '#F1948A',
                    },
                    fontFamily: {
                        display: ['Abril Fatface', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            background: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%238B5A2B' fill-opacity='0.08'%3E%3Ccircle cx='20' cy='20' r='5'/%3E%3Ccircle cx='60' cy='60' r='5'/%3E%3C/g%3E%3C/svg%3E"), linear-gradient(135deg, #FFF0F5 0%, #FFE4E9 100%);
            background-size: 80px 80px, 100% 100%;
            background-attachment: fixed;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            color: #4A3728;
            line-height: 1.7;
            min-height: 100vh;
        }
        .font-display { font-family: 'Abril Fatface', serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #FFE4E9; border-radius: 3px; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input:focus, select:focus { outline: none; border-color: #FFB5C5; box-shadow: 0 0 0 3px rgba(255,181,197,0.2); }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .anim-fade-in { animation: fadeIn 0.4s ease-out both; }
        .anim-fade-in-up { animation: fadeInUp 0.5s ease-out both; }
        .anim-slide-in { animation: slideIn 0.4s ease-out both; }
        .anim-scale-in { animation: scaleIn 0.3s ease-out both; }
        .anim-breathe { animation: breathe 3s ease-in-out infinite; }
        .btn-tap:active { transform: scale(0.97); transition: transform 0.1s; }
        .hover-lift { transition: transform 0.2s, box-shadow 0.2s; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(139,90,43,0.08); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="app.js"></script>
    <!-- Bunny 足迹访问计数器 — 隐蔽可爱风格 -->
<div id="bunny-counter" style="position:fixed;bottom:16px;right:16px;z-index:50;font-family:'Inter',sans-serif;font-size:11px;color:#8B7355;opacity:0.35;transition:opacity 0.3s;cursor:default;user-select:none;" onmouseenter="this.style.opacity='0.85'" onmouseleave="this.style.opacity='0.35'">
    <span style="display:inline-flex;align-items:center;gap:5px;">
        <!-- bunny footprint SVG -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#FFB5C5" style="opacity:0.7;">
            <ellipse cx="8" cy="6" rx="3" ry="4"/>
            <ellipse cx="16" cy="6" rx="3" ry="4"/>
            <ellipse cx="6" cy="12" rx="2.5" ry="3.5"/>
            <ellipse cx="18" cy="12" rx="2.5" ry="3.5"/>
            <ellipse cx="12" cy="18" rx="5" ry="6"/>
        </svg>
        <span id="bunny-hops">...</span>
        <span style="font-size:9px;opacity:0.5;">hops</span>
    </span>
</div>

<script>
    (function() {
        const KEY = 'ixia321-bunnylift-views';
        const BASE = 'https://countapi.mileshilliard.com/api/v1';
        
        // 先计数 +1
        fetch(`${BASE}/hit/${KEY}`)
            .then(r => r.json())
            .then(data => {
                // 显示当前数字
                const el = document.getElementById('bunny-hops');
                if (el && data.value) {
                    el.textContent = Number(data.value).toLocaleString();
                }
            })
            .catch(() => {
                // 如果 hit 失败，尝试只获取不增加
                fetch(`${BASE}/get/${KEY}`)
                    .then(r => r.json())
                    .then(data => {
                        const el = document.getElementById('bunny-hops');
                        if (el && data.value) {
                            el.textContent = Number(data.value).toLocaleString();
                        }
                    })
                    .catch(() => {
                        const el = document.getElementById('bunny-hops');
                        if (el) el.textContent = '';
                    });
            });
    })();
</script>

</body>
</html>
